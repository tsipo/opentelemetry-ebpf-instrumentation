version: "3.8"

services:
  testserver:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/testserver/Dockerfile
    image: hatest-testserver
    ports:
      - "8085:8080"

  pythonasync:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/pythonasync-uvloop/Dockerfile-3.9
    image: hatest-pythonasync-uvloop
    ports:
      - "8391:8391"
    environment:
      LOG_LEVEL: DEBUG
      BACKEND_URL: "http://testserver:8080"
      UVICORN_LOOP: "uvloop"
      OTEL_SERVICE_NAME: "pythonasync-uvloop"
    depends_on:
      testserver:
        condition: service_started

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    command:
      - --config=/configs/obi-config.yml
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security${SECURITY_CONFIG_SUFFIX}:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-python-async:/var/run/obi
    image: hatest-obi
    privileged: true
    pid: "host"
    environment:
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_TRACE_PRINTER: "text"
      OTEL_EBPF_OPEN_PORT: "8391,8080"
      OTEL_EBPF_METRICS_FEATURES: "application,application_span_otel,application_process,application_service_graph,ebpf,application_host"
      OTEL_EBPF_PROMETHEUS_FEATURES: "application,application_span_otel,application_process,application_service_graph,ebpf,application_host"
      OTEL_EBPF_DISCOVERY_POLL_INTERVAL: 500ms
      OTEL_EBPF_EXECUTABLE_NAME: ""
      OTEL_EBPF_SERVICE_NAMESPACE: "integration-test"
      OTEL_EBPF_METRICS_INTERVAL: "1s"
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "10ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_INTERNAL_METRICS_PROMETHEUS_PORT: 8999
      OTEL_EBPF_PROCESSES_INTERVAL: "100ms"
      OTEL_EBPF_HOSTNAME: "obi"
      OTEL_EBPF_PROMETHEUS_EXTRA_SPAN_RESOURCE_ATTRIBUTES: "service.version"
      OTEL_EBPF_EXTRA_SPAN_RESOURCE_ATTRIBUTES: "service.version"
    ports:
      - "8999:8999"
    depends_on:
      pythonasync:
        condition: service_started
      testserver:
        condition: service_started
      jaeger:
        condition: service_started

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config-weaver.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4317"
      - "4318"
      - "9464"
      - "8888"
    depends_on:
      obi:
        condition: service_started
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
      weaver:
        condition: service_healthy


  weaver:
    extends:
      file: components/weaver/service.yml
      service: weaver
    volumes:
      - ../../../schemas/obi:/obi-registry:ro
  prometheus:
    image: quay.io/prometheus/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config.yml
      - --web.enable-lifecycle
      - --enable-feature=exemplar-storage
      - --web.route-prefix=/
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:1.60@sha256:4fd2d70fa347d6a47e79fcb06b1c177e6079f92cba88b083153d56263082135e
    ports:
      - "16686:16686"
      - "4317"
      - "4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=debug
