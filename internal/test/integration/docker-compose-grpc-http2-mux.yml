version: "3.8"

services:
  testclient:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/go_grpc_server_mux/Dockerfile_pinger${TEST_SUFFIX}
    image: hatest-testclient
    environment:
      TARGET_URL: ${TARGET_URL}
    depends_on:
      testserver:
        condition: service_started

  testserver:
    build:
      context: components/go_grpc_server_mux/
      dockerfile: Dockerfile${TEST_SUFFIX}
    image: hatest-server
    ports:
      - ${TARGET_PORTS}
    depends_on:
      otelcol:
        condition: service_started

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    command:
      - --config=/configs/obi-config-grpc-http2-mux.yml
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security${SECURITY_CONFIG_SUFFIX}:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-http2-mux:/var/run/obi
    image: hatest-obi
    privileged: true # in some environments (not GH Pull Requests) you can set it to false and then cap_add: [ SYS_ADMIN ]
    pid: "host"
    environment:
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_TRACE_PRINTER: "text"
      OTEL_EBPF_METRICS_INTERVAL: "1s"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "10ms"
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_HOSTNAME: "obi"
    depends_on:
      testclient:
        condition: service_started

  # OpenTelemetry Collector — fans OBI's OTLP push out to jaeger (production
  # path used by the test's trace assertions) and to weaver (semconv tap).
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config-weaver.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4317" # OTLP over gRPC receiver
      - "4318:4318" # OTLP over HTTP receiver
      - "9464" # Prometheus exporter
      - "8888" # metrics endpoint
    depends_on:
      jaeger:
        condition: service_started
      prometheus:
        condition: service_started
      weaver:
        condition: service_healthy

  weaver:
    extends:
      file: components/weaver/service.yml
      service: weaver
    volumes:
      - ../../../schemas/obi:/obi-registry:ro

  # Prometheus
  prometheus:
    image: quay.io/prometheus/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config-promscrape.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:1.60@sha256:4fd2d70fa347d6a47e79fcb06b1c177e6079f92cba88b083153d56263082135e
    ports:
      - "16686:16686" # Query frontend
      - "4317" # OTEL GRPC traces collector (internal — otelcol talks to jaeger over the docker network)
      - "4318" # OTEL HTTP traces collector (internal)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=debug
# curl http://localhost:16686/api/services
# curl http://localhost:16686/api/traces?service=testserver
