name: Lint

on:
  push:
    branches: [main, release-*]
  pull_request:
    branches: [main, release-*]
    paths:
      - ".github/workflows/lint.yml"
      - "Dockerfile"
      - "**/*Dockerfile*"
      - "Makefile"
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "bpf/**"
      - "cmd/**"
      - "devdocs/dependency-integrity-policy.md"
      - "devdocs/README.md"
      - "scripts/lint-dependency-policy.sh"
      - "configs/**"
      - "internal/**"
      - "pkg/**"
      - "scripts/**"
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string

concurrency:
  group: pr-lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # macOS runners lack Docker so they can't run `make docker-generate`. Run it
  # once on Linux, share artifact with both lint jobs.
  generate-bpf:
    name: Generate BPF
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/generate-bpf

  lint-linux:
    name: Lint on linux
    needs: generate-bpf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated BPF files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bpf-generated-${{ github.run_id }}

      - name: Lint
        run: make lint

      - name: Lint OBI semantic-convention registry
        run: make lint-schema

  lint-darwin:
    name: Lint on macOS
    needs: generate-bpf
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated BPF files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bpf-generated-${{ github.run_id }}

      - name: Lint
        run: make lint
