name: BPF verifier

on:
  push:
    branches: [main, release-*]
  pull_request:
    branches: [main, release-*]
    paths:
      - ".github/workflows/bpf_verifier.yml"
      - ".github/actions/generate-bpf/**"
      - ".github/actions/free-disk/**"
      - ".github/actions/setup-lvh-kernel/**"
      - "bpf/**"
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "internal/test/vm/**"
      - "scripts/kernel-matrix-json.sh"
      - "Makefile"
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string

concurrency:
  group: pr-bpf-verifier-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-bpf:
    name: Generate BPF
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/generate-bpf

  matrix:
    name: Build matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      kernels: ${{ steps.k.outputs.kernels }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false
      - id: k
        run: |
          echo -n "kernels=" >> "$GITHUB_OUTPUT"
          bash scripts/kernel-matrix-json.sh --kind=verifier >> "$GITHUB_OUTPUT"

  test:
    name: Kernel ${{ matrix.kernel.id }}
    needs: [matrix, generate-bpf]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        kernel: ${{ fromJson(needs.matrix.outputs.kernels).include }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/free-disk
        with:
          docker-prune: 'false'

      - name: Download generated BPF files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bpf-generated-${{ github.run_id }}

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-utils qemu-system-x86

      - id: kernel
        uses: ./.github/actions/setup-lvh-kernel
        with:
          kernel-id: ${{ matrix.kernel.id }}
          lvh-tag: ${{ matrix.kernel.lvh_tag }}

      - name: Run BPF verifier tests in VM
        env:
          KERNEL: ${{ steps.kernel.outputs.kernel }}
          MODULES_DIR: ${{ steps.kernel.outputs.modules-dir }}
        run: |
          sudo make -C internal/test/vm \
            KERNEL="$KERNEL" \
            MODULES_DIR="$MODULES_DIR" \
            ARCH=amd64 \
            TARGET_TEST=run-bpf-verifier-vm \
            && [ -f testoutput/success ]

  generate-bpf-arm:
    name: Generate BPF (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/generate-bpf
        with:
          artifact-name: bpf-generated-arm-${{ github.run_id }}

  al2023:
    name: Kernel al2023-${{ matrix.nvr }}
    needs: generate-bpf
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - nvr: "6.1.172-216.329.amzn2023"
            pkg: "kernel"
          - nvr: "6.12.88-119.157.amzn2023"
            pkg: "kernel6.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/free-disk
        with:
          docker-prune: 'false'

      - name: Download generated BPF files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bpf-generated-${{ github.run_id }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qemu-utils qemu-system-x86 cpio

      - name: Run BPF verifier on AL2023 kernel
        env:
          GOTOOLCHAIN: auto
        run: sudo -E bash internal/test/vm/lvh/al2023/run.sh "${{ matrix.nvr }}" "${{ matrix.pkg }}"

  host-arm64:
    name: Host kernel (arm64)
    # Runs verifier suite directly on the runner's own kernel — no VM, no
    # kernel matrix. Cheapest way to keep arm64 in the PR-blocking set.
    needs: generate-bpf-arm
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go build cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated BPF files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bpf-generated-arm-${{ github.run_id }}

      - name: Run BPF verifier tests (host kernel)
        run: go test -exec=sudo -count=1 -timeout=20m -parallel=8 -tags=bpf_verifier_tests ./pkg/internal/ebpf/verifier/...
