name: Generate BPF
description: |
  Run `make docker-generate` and publish the resulting `_bpfel.go` +
  `_bpfel.o` files as a workflow artifact. Caller must `actions/checkout`
  first so this composite can resolve the local Go module + Makefile.

inputs:
  artifact-name:
    description: 'Artifact name to upload BPF files under. Default keys on github.run_id.'
    required: false
    default: bpf-generated-${{ github.run_id }}
  cache-key-prefix:
    description: 'Prefix for the Go build cache. Defaults to the umbrella PR prefix.'
    required: false
    default: go-build-pr-race

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Go build cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
      with:
        path: ~/.cache/go-build
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ runner.arch }}-

    - name: Pre-pull generator image
      shell: bash
      run: |
        IMG=$(grep -E "^GEN_IMG \?= " Makefile | awk '{print $3}')
        for i in 1 2 3 4 5; do
          if docker pull "$IMG"; then
            exit 0
          fi
          echo "pull attempt $i failed, retrying in $((i*5))s"
          sleep $((i*5))
        done
        echo "all pull attempts failed"
        exit 1

    - name: Generate BPF files
      shell: bash
      run: make docker-generate

    - name: Upload generated BPF files
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          **/*_bpfel.go
          **/*_bpfel.o
        retention-days: 1
