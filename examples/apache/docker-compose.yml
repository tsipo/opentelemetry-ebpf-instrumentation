services:
  edge-apache:
    image: httpd:2.4.67-alpine@sha256:0136c2d4462f3b8ecc92bea70efdfef4d06523999ae8d7aa533969dea6db4576
    container_name: edge-apache
    network_mode: host
    volumes:
      - ./docker/edge/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./shared:/usr/local/apache2/conf/shared:ro
      - ./htdocs:/usr/local/apache2/htdocs:ro
    depends_on:
      - recommendations-v1
      - recommendations-v2

  recommendations-v1:
    image: httpd:2.4.67-alpine@sha256:0136c2d4462f3b8ecc92bea70efdfef4d06523999ae8d7aa533969dea6db4576
    container_name: recommendations-v1-apache
    network_mode: host
    volumes:
      - ./docker/recommendations-v1/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./shared:/usr/local/apache2/conf/shared:ro
      - ./htdocs:/usr/local/apache2/htdocs:ro

  recommendations-v2:
    image: httpd:2.4.67-alpine@sha256:0136c2d4462f3b8ecc92bea70efdfef4d06523999ae8d7aa533969dea6db4576
    container_name: recommendations-v2-apache
    network_mode: host
    volumes:
      - ./docker/recommendations-v2/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./shared:/usr/local/apache2/conf/shared:ro
      - ./htdocs:/usr/local/apache2/htdocs:ro
    depends_on:
      - recommendations-v1

  traffic-generator:
    build:
      context: .
      dockerfile: traffic-runner/Dockerfile
    container_name: apache-traffic-generator
    network_mode: host
    command:
      - --base-url
      - http://127.0.0.1:8080
      - --progress-seconds
      - "15"
    depends_on:
      - edge-apache

  obi:
    image: ${OBI_IMAGE:-otel/ebpf-instrument:v0.9.0@sha256:26f82b148dfe8cb0530561ab72a3cb5490b3ae5df556a33c27984af2e28542cf}
    container_name: obi-apache-example
    command:
      - --config=/config/obi-config.yaml
    network_mode: host
    pid: host
    privileged: true
    volumes:
      - ./docker/obi-config.yaml:/config/obi-config.yaml:ro
    depends_on:
      - edge-apache
      - recommendations-v1
      - recommendations-v2
      - traffic-generator
      - lgtm

  lgtm:
    image: grafana/otel-lgtm:0.27.1@sha256:f533fb9c059aad2d47658e9dc059289755d992404b62168b40b3fbcbe4623355
    container_name: lgtm-apache-example
    network_mode: host
