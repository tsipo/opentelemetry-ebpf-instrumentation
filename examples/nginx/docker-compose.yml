services:
  edge-nginx:
    image: nginx:1.31.0-alpine@sha256:f105e3f12187c58ddc3acd09bbe4b9e4a9ab1df855d3d0e511b641077b5e988e
    container_name: edge-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./docker/edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1
      - recommendations-v2

  recommendations-v1:
    image: nginx:1.31.0-alpine@sha256:f105e3f12187c58ddc3acd09bbe4b9e4a9ab1df855d3d0e511b641077b5e988e
    container_name: recommendations-v1
    volumes:
      - ./docker/recommendations-v1/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro

  recommendations-v2:
    image: nginx:1.31.0-alpine@sha256:f105e3f12187c58ddc3acd09bbe4b9e4a9ab1df855d3d0e511b641077b5e988e
    container_name: recommendations-v2
    volumes:
      - ./docker/recommendations-v2/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1

  traffic-generator:
    build:
      context: .
      dockerfile: traffic-runner/Dockerfile
    container_name: nginx-traffic-generator
    command:
      - --base-url
      - http://edge-nginx:8080
      - --progress-seconds
      - "15"
    depends_on:
      - edge-nginx

  obi:
    image: ${OBI_IMAGE:-otel/ebpf-instrument:v0.9.0@sha256:26f82b148dfe8cb0530561ab72a3cb5490b3ae5df556a33c27984af2e28542cf}
    container_name: obi-nginx-example
    command:
      - --config=/config/obi-config.yaml
    pid: host
    privileged: true
    volumes:
      - ./docker/obi-config.yaml:/config/obi-config.yaml:ro
    depends_on:
      - edge-nginx
      - recommendations-v1
      - recommendations-v2
      - traffic-generator
      - lgtm

  lgtm:
    image: grafana/otel-lgtm:0.28.0@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
    container_name: lgtm-nginx-example
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
